name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Windows .exe
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.11.0

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Windows executable
        run: wails build -platform windows/amd64 -clean -trimpath -ldflags "-s -w -X main.Version=${{ github.ref_name }}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ArcheRageAddonManager-windows-amd64
          path: build/bin/ArcheRageAddonManager.exe
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/bin/ArcheRageAddonManager.exe
          generate_release_notes: true
          draft: false
          prerelease: false
